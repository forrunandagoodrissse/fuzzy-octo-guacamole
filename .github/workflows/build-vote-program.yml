name: Build vote-delegate program

on:
  workflow_dispatch:
  push:
    paths:
      - "programs/vote-delegate/**"
      - ".github/workflows/build-vote-program.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-vote-delegate-${{ hashFiles('programs/vote-delegate/**/Cargo.toml') }}

      - name: Install Solana + Anchor
        run: |
          curl -sSfL https://release.anza.xyz/v2.1.21/install | sh
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked --force

      - name: Build
        working-directory: programs/vote-delegate
        run: anchor build

      - name: Upload program artifact
        uses: actions/upload-artifact@v4
        with:
          name: vote-delegate-program
          path: |
            programs/vote-delegate/target/deploy/vote_delegate.so
            programs/vote-delegate/target/deploy/vote_delegate-keypair.json
          if-no-files-found: error
