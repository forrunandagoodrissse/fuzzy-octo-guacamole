# /etc/nginx/sites-available/mysite
# Site root = /var/www/mysite/public (HTML + loader.php + cache/)
# Do NOT use snippets/fastcgi-php.conf — it breaks SCRIPT_FILENAME.

server {
    listen 80;
    listen [::]:80;
    server_name vote-moonshot.top www.vote-moonshot.top;

    root /var/www/mysite/public;
    index index.html;

    location ^~ /cache/ {
        deny all;
    }

    # Match script_path in loader.php $cfg (no .php in URL)
    location = /vault388522 {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/mysite/public/loader.php;
    }

    location = /vault388522.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/mysite/public/loader.php;
    }

    location ~ \.php$ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }
}

# After certbot: copy location blocks into the listen 443 ssl { } server.
