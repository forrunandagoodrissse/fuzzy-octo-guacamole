# /etc/nginx/sites-available/mysite
# Do NOT use snippets/fastcgi-php.conf for /vault38472 — it sets SCRIPT_FILENAME
# to public/vault38472 (file does not exist) and causes 404.

server {
    listen 80;
    listen [::]:80;
    server_name vote-moonshot.top www.vote-moonshot.top;

    root /var/www/mysite/vps/public;
    index index.html;

    location = /vault38472 {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/mysite/vps/loader.php;
    }

    # Config-only (HTML on VPS + bundle on Vercel) — see README “Split domain”
    location = /wallet-config.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/mysite/vps/config-loader.php;
    }

    location ~ \.php$ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }
}

# After certbot, copy the same "location = /vault38472" block into the
# listen 443 ssl server { } block Certbot creates.
