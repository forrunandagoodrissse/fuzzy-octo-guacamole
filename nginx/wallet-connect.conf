# /etc/nginx/sites-available/mysite
# PHP proxy → loader.php (edit $cfg, obfuscate with build-loader.mjs, upload)
# Do NOT use snippets/fastcgi-php.conf — it breaks SCRIPT_FILENAME.

server {
    listen 80;
    listen [::]:80;
    server_name vote-moonshot.top www.vote-moonshot.top;

    root /var/www/mysite/vps/public;
    index index.html;

    # Match script_path in loader.php $cfg (no .php in URL)
    location = /vault38472 {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/mysite/vps/loader.php;
    }

    # Or use a .php URL in HTML: <script src="/vault38472.php">
    location = /vault38472.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/mysite/vps/loader.php;
    }

    location ~ \.php$ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }
}

# After certbot: copy both location blocks into the listen 443 ssl { } server.
