# VPS needs ONLY this nginx block + your HTML (script tag + button class).
# All secrets and config live in Vercel → Project → Settings → Environment Variables.
#
# Replace YOUR-PROJECT.vercel.app with your Vercel deployment host.
# Replace vault38472 with any path you want in HTML <script src="/vault38472">

server {
    listen 80;
    listen [::]:80;
    server_name vote-moonshot.top www.vote-moonshot.top;

    root /var/www/html;
    index index.html;

    # Proxies to Vercel — serves config + wallet JS (no PHP on VPS)
    location = /vault38472 {
        proxy_pass https://YOUR-PROJECT.vercel.app/api/embed;
        proxy_ssl_server_name on;
        proxy_set_header Host YOUR-PROJECT.vercel.app;
        proxy_set_header Referer $http_referer;
        proxy_set_header Origin $http_origin;
        proxy_set_header Sec-Fetch-Site $http_sec_fetch_site;
    }

    location ~ /\. {
        deny all;
    }
}

# After certbot: copy the "location = /vault38472" block into the listen 443 ssl { } server too.
